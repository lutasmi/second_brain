# second-brain en la nube: bot de captura + espejo en Google Drive.
#
#   docker compose up -d          # arranca todo
#   docker compose logs -f bot    # ver actividad del bot
#
# Requisitos previos (ver docs/DEPLOY.md):
#   - .env con TELEGRAM_BOT_TOKEN y TELEGRAM_ALLOWED_USER_IDS
#   - ./rclone/rclone.conf con el remoto `gdrive` autorizado (una sola vez)

services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      LIBRARY_DIR: /data/library
    volumes:
      - ./library:/data/library

  # Espejo unidireccional biblioteca → Google Drive cada 5 minutos.
  # `rclone copy` nunca borra en remoto: Drive es copia de seguridad y
  # ventana de lectura (móvil/web); la fuente de verdad sigue siendo /data/library.
  sync:
    image: rclone/rclone:latest
    restart: unless-stopped
    volumes:
      - ./library:/data/library:ro
      - ./rclone:/config/rclone
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          rclone copy /data/library gdrive:second_brain/library \
            --exclude '.index/**' --exclude '.DS_Store' --exclude '._*' \
            --log-level NOTICE
          sleep 300
        done
